{% load i18n %}<!doctype html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_BIDI %}rtl{% else %}ltr{% endif %}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% translate 'ما في اتصال بالإنترنت' %} — الصَّيَّاد</title>
<style>
  /* مكتفية بذاتها قصداً: بلا إنترنت لا تصل ملفات CSS الخارجية،
     فالألوان منسوخة من tokens.css بدل استيرادها. تحترم الوضع الليلي. */
  :root { --bg: #F5F7FB; --fg: #131722; --muted: #5A6472; --primary: #0E7C90; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0A0E16; --fg: #EAEEF6; --muted: #98A3B5; --primary: #2CC2CE; }
  }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: var(--bg); color: var(--fg);
         font-family: "IBM Plex Sans Arabic", system-ui, "Segoe UI", Tahoma, sans-serif; }
  .card { text-align: center; padding: 32px; }
  .mark { inline-size: 64px; block-size: 64px; margin: 0 auto 16px;
          display: grid; place-items: center;
          background: linear-gradient(135deg, #16B8C6, #7C5CFF); color: #FFFFFF;
          border-radius: 18px; font-size: 2rem; font-weight: 700; }
  h1 { color: var(--fg); font-size: 1.4rem; margin: 0 0 8px; }
  p { color: var(--muted); margin: 0 0 20px; line-height: 1.8; }
  a { display: inline-block; background: var(--primary); color: #FFFFFF;
      text-decoration: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">ص</div>
    <h1>{% translate 'ما في اتصال بالإنترنت' %}</h1>
    <p>{% translate 'تأكد من الشبكة وجرّب مرة ثانية — سلّتك وطلباتك بأمان.' %}</p>
    <a href="/">{% translate 'جرّب مجدداً' %}</a>
  </div>
</body>
</html>
